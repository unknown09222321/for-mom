<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffeaf2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* Initial Screen */
        #gatekeeper {
            text-align: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 25px;
            margin: 10px;
            transition: transform 0.2s;
        }

        .btn-open { background-color: #ff85a1; color: white; }
        .btn-no { background-color: #ccc; color: white; }
        button:hover { transform: scale(1.1); }

        /* Secret Content */
        #content { display: none; text-align: center; width: 100%; }

        .teddy {
            font-size: 80px;
            cursor: pointer;
            user-select: none;
            display: inline-block;
            animation: bob 2s infinite ease-in-out;
        }

        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .message-bubble {
            background: white;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 10px;
            font-weight: bold;
            color: #d81b60;
        }

        #extra-love {
            font-size: 1.5rem;
            color: #ff4d6d;
            margin: 20px;
            font-weight: bold;
            display: none;
        }

        /* Garden Section */
        #garden {
            margin-top: 50px;
            width: 100%;
            max-width: 600px;
            height: 200px;
            border-bottom: 10px solid #8d6e63;
            position: relative;
            background-color: #f1f8e9;
        }

        .flower {
            position: absolute;
            bottom: 0;
            font-size: 30px;
            animation: grow 0.5s ease-out;
        }

        @keyframes grow {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .instruction { color: #666; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <h1>Hi Mom! ❤️</h1>
        <button class="btn-open" onclick="showSurprise()">Open</button>
        <button class="btn-no" onclick="alert(&#39;Are you sure? Try again! 😊&#39;)">No</button>
    </div>

    <div id="content">
        <div class="message-bubble">I have a message for you!</div>
        <div class="teddy" onclick="spreadLove()">
            🧸<br>
            <span style="font-size: 20px;">💌 "Love You"</span>
        </div>

        <div id="extra-love">love you love love youuuuuuuuuuuuuuuuuuu</div>

        <div id="garden-area" style="display:none; margin-top:40px;">
            <h3>Click anywhere in the box below to plant flowers! 🌸</h3>
            <div id="garden" onclick="plantFlower(event)"></div>
            <p class="instruction">Every click is a flower for you!</p>
        </div>
    </div>

    <script>
        function showSurprise() {
            document.getElementById('gatekeeper').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        }

        function spreadLove() {
            document.getElementById('extra-love').style.display = 'block';
            document.getElementById('garden-area').style.display = 'block';
        }

        function plantFlower(event) {
            const garden = document.getElementById('garden');
            const flower = document.createElement('span');
            const flowers = ['🌸', '🌼', '🌷', '🌹', '🌻', '🌺'];
            
            flower.className = 'flower';
            flower.innerText = flowers[Math.floor(Math.random() * flowers.length)];
            
            // Positioning
            const rect = garden.getBoundingClientRect();
            const x = event.clientX - rect.left - 15;
            flower.style.left = x + 'px';
            
            garden.appendChild(flower);
        }
    </script>

</body></html>
